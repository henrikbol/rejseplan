name: rejseplan-app
services:
- name: web
  image:
    registry_type: DOCR
    repository: uggiuggi/tog
    tag: latest
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 8080
  routes:
  - path: /
  envs:
  - key: RPL_ACCESS_ID
    scope: RUN_TIME
    type: SECRET
  run_command: uvicorn app:app --host 0.0.0.0 --port 8080
